    const pct = d => (d / TOTAL_DAYS * 100);

    /* ============================================================
       COMPONENT — GanttBar
    ============================================================ */
    function GanttBar({ task, urgency, onSelect, selected }) {
      const urg = URGENCY[urgency];
      const left  = pct(task.start);
      const width = Math.max(0.4, pct(task.end) - pct(task.start));
      return (
        <div
          onClick={() => onSelect(task)}
          title={task.name + "\n👥 " + task.assigned.join(", ")}
          style={{
            position:"absolute", left:`${left}%`, width:`${width}%`,
            top:"6px", height:"28px",
            background: urg.bg,
            borderRadius:"5px", cursor:"pointer",
            display:"flex", alignItems:"center", paddingLeft:"6px",
            overflow:"hidden",
            boxShadow: selected
              ? `0 0 0 3px #fff, 0 0 0 5px ${urg.bg}, 0 2px 8px rgba(0,0,0,0.3)`
              : "0 1px 4px rgba(0,0,0,0.25)",
            transform: selected ? "scaleY(1.12)" : "none",
            transition:"transform .15s, box-shadow .15s",
            zIndex: selected ? 10 : 2,
          }}
        >
          <span style={{ fontSize:"9px", color:"#fff", fontWeight:700, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>
            {task.assigned.join(" · ")}
          </span>
        </div>
      );
    }

    function MemberBadge({ code, data, type }) {

      const light = type === "Mo" ? "#f0fff6" : "#f0f5ff";
      return (
        <div style={{
          background:light, border:`1px solid ${border}`, borderRadius:8,
          padding:"7px 12px", marginBottom:6, fontSize:12,
        }}>
          <span style={{ background:bg, color:"#fff", borderRadius:4, padding:"1px 7px", fontSize:10, fontWeight:900, marginRight:8 }}>{code}</span>
          <strong>{data.name}</strong>
          <div style={{ fontSize:10, color:"#475569", marginTop:2, paddingLeft:38 }}>{data.role}</div>
        </div>
      );
    }

            t.name.toLowerCase().includes(filter.toLowerCase())
          )
        }))
        .filter(ph => ph.tasks.length > 0);

      /* ---------- RENDER ---------- */
      return (
        <div style={{ fontFamily:"'Segoe UI',system-ui,sans-serif", background:"#f8fafc", minHeight:"100vh", color:"#1e293b" }}>

          {/* ── HEADER ── */}
          <div style={{ background:"linear-gradient(135deg,#0a3622 0%,#1a5f3f 55%,#0d6efd 100%)", padding:"28px 32px 18px", color:"#fff" }}>
            <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", flexWrap:"wrap", gap:12, marginBottom:14 }}>
              <div>
                <div style={{ fontSize:11, letterSpacing:3, fontWeight:700, opacity:.75, marginBottom:5 }}>
                  UNIVERSITÉ ABOU BEKR BELKAID — TLEMCEN, ALGÉRIE
                </div>
                <h1 style={{ margin:0, fontSize:22, fontWeight:900, letterSpacing:-0.5 }}>
                  🎓 SDBQL 2026 — DIAGRAMME DE GANTT STRATÉGIQUE
                </h1>
                <p style={{ margin:"5px 0 0", fontSize:12, opacity:.85 }}>
                  2ème Congrès International · 30 Sept – 2 Oct 2026 · 7 Phases ·{" "}
                  {PHASES.reduce((a,p)=>a+p.tasks.length,0)} Tâches ·{" "}
                  {Object.keys(MO).length} Mo + {Object.keys(MS).length} Ms
                </p>
              </div>
              <div style={{ display:"flex", flexDirection:"column", alignItems:"flex-end", gap:8 }}>
                <div style={{ background:"rgba(255,255,255,.15)", borderRadius:8, padding:"7px 14px", fontSize:13 }}>
                  📍 Aujourd'hui : <strong>6 Mars 2026</strong> — J–207 avant le Congrès
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  {["gantt","members"].map(m => (
                    <button key={m} onClick={()=>setView(m)} style={{
                      background: view===m ? "#fff" : "rgba(255,255,255,.2)",
                      color: view===m ? "#0a3622" : "#fff",
                      border:"none", borderRadius:6, padding:"7px 16px",
                      cursor:"pointer", fontWeight:700, fontSize:13,
                    }}>
                      {m==="gantt" ? "📊 Gantt" : "👥 Membres"}
                    </button>
                  ))}
                </div>
              </div>
            </div>
            {/* legend */}
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              {Object.entries(URGENCY).map(([k,v]) => (
                <span key={k} style={{
                  background:v.bg, color:"#fff", borderRadius:20,
                  padding:"3px 11px", fontSize:11, fontWeight:700,
                }}>{v.label}</span>
              ))}
            </div>
          </div>

          {/* ── FILTER BAR ── */}
          <div style={{ background:"#fff", borderBottom:"1px solid #e2e8f0", padding:"11px 32px", display:"flex", gap:14, alignItems:"center", flexWrap:"wrap" }}>
            <span style={{ fontWeight:700, fontSize:13, color:"#475569" }}>🔍 Filtrer :</span>
            <input
              placeholder="Code membre (Mo1, Ms0…) ou mot-clé de tâche"
              value={filter}
              onChange={e=>setFilter(e.target.value)}
              style={{
                border:"1px solid #cbd5e1", borderRadius:6, padding:"6px 12px",
                fontSize:13, width:280, outline:"none",
              }}
            />
            {filter && (
              <button onClick={()=>setFilter("")} style={{
                background:"#dc3545", color:"#fff", border:"none",
                borderRadius:6, padding:"6px 12px", cursor:"pointer", fontWeight:700, fontSize:13,
              }}>✕ Effacer</button>
            )}
            <span style={{ marginLeft:"auto", fontSize:12, color:"#94a3b8" }}>
              {filteredPhases.reduce((a,p)=>a+p.tasks.length,0)} tâches affichées
            </span>
          </div>

          {/* ══════════════════════════════════
              VUE — MEMBRES
          ══════════════════════════════════ */}
          {view === "members" && (
            <div style={{ padding:32 }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:32 }}>
                {/* MO */}
                <div>
                  <h2 style={{ color:"#0a3622", borderBottom:"3px solid #198754", paddingBottom:8, marginBottom:18, fontSize:17 }}>
                    🏛️ COMITÉ D'ORGANISATION ({Object.keys(MO).length} membres)
                  </h2>
                  {Object.entries(MO).map(([code,data]) => <MemberBadge key={code} code={code} data={data} type="Mo" />)}
                </div>
                {/* MS */}
                <div>
                  <h2 style={{ color:"#084298", borderBottom:"3px solid #0d6efd", paddingBottom:8, marginBottom:18, fontSize:17 }}>
                    🔬 COMITÉ SCIENTIFIQUE ({Object.keys(MS).length} membres)
                  </h2>
                  {Object.entries(MS).map(([code,data]) => <MemberBadge key={code} code={code} data={data} type="Ms" />)}
                  <div style={{ marginTop:12, padding:"10px 14px", background:"#fffbea", border:"1px dashed #f59e0b", borderRadius:8, fontSize:12, color:"#92400e", fontStyle:"italic" }}>
                    ⏳ D'autres membres seront ajoutés prochainement.
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* ══════════════════════════════════
              VUE — GANTT
          ══════════════════════════════════ */}
          {view === "gantt" && (
            <div style={{ padding:"24px 0 32px" }}>
              <div style={{ overflowX:"auto" }}>
                <div style={{ minWidth:1100 }}>

                  {/* ── HEADER MOIS ── */}
                  <div style={{
                    display:"flex", position:"sticky", top:0, zIndex:20,
                    background:"#fff", borderBottom:"2px solid #e2e8f0",
                  }}>
                    <div style={{
                      width:LABEL_W, minWidth:LABEL_W, flexShrink:0,
                      padding:"8px 24px", fontWeight:700, fontSize:11, color:"#475569",
                      borderRight:"2px solid #e2e8f0", display:"flex", alignItems:"center",
                    }}>TÂCHE</div>
                    <div style={{ flex:1, position:"relative", height:36 }}>
                      {MONTHS.map(m => (
                        <div key={m.label} style={{
                          position:"absolute", left:`${pct(m.start)}%`, width:`${pct(m.days)}%`,
                          top:0, bottom:0, borderRight:"1px solid #e2e8f0",
                          display:"flex", alignItems:"center", paddingLeft:6,
                        }}>
                          <span style={{ fontSize:11, fontWeight:700, color:"#64748b", whiteSpace:"nowrap" }}>{m.label}</span>
                        </div>
                      ))}
                      {/* Today vertical */}
                      <div style={{
                        position:"absolute", left:`${pct(TODAY)}%`,
                        top:0, bottom:-9999, width:2,
                        background:"rgba(220,53,69,0.6)", zIndex:15, pointerEvents:"none",
                      }} />
                    </div>
                  </div>

                  {/* ── ROW JALONS ── */}
                  <div style={{ display:"flex", background:"#f8fafc", borderBottom:"1px solid #e2e8f0", height:32 }}>
                    <div style={{
                      width:LABEL_W, minWidth:LABEL_W, flexShrink:0,
                      padding:"0 24px", fontSize:10, fontWeight:700, color:"#94a3b8",
                      borderRight:"2px solid #e2e8f0", display:"flex", alignItems:"center",
                    }}>JALONS CLÉS</div>
                    <div style={{ flex:1, position:"relative" }}>
                      {MILESTONES.map(ms => (
                        <div key={ms.day} style={{
                          position:"absolute", left:`${pct(ms.day)}%`,
                          top:"50%", transform:"translate(-50%,-50%)",
                          textAlign:"center", whiteSpace:"nowrap", zIndex:5,
                        }}>
                          <span style={{ fontSize:10 }}>{ms.icon}</span>
                          <div style={{ fontSize:8, fontWeight:700, color:ms.color, marginTop:1 }}>{ms.label}</div>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* ── PHASES ── */}
                  {filteredPhases.map(phase => {
                    const urg = URGENCY[phase.urgency];
                    const open = expanded[phase.id];
                    const s = Math.min(...phase.tasks.map(t=>t.start));
                    const e = Math.max(...phase.tasks.map(t=>t.end));
                    return (
                      <div key={phase.id}>
                        {/* Phase header */}
                        <div
                          onClick={() => toggle(phase.id)}
                          style={{ display:"flex", background:urg.bg, cursor:"pointer", borderBottom:"1px solid rgba(0,0,0,.1)" }}
                        >
                          <div style={{
                            width:LABEL_W, minWidth:LABEL_W, flexShrink:0,
                            padding:"10px 24px", color:"#fff", fontWeight:800, fontSize:12,
                            display:"flex", alignItems:"center", gap:8,
                            borderRight:"2px solid rgba(255,255,255,.2)",
                          }}>
                            <span style={{ fontSize:16 }}>{phase.icon}</span>
                            <span style={{ flex:1 }}>{phase.label}</span>
                            <span style={{ opacity:.8, fontSize:11 }}>{phase.tasks.length} tâches {open?"▲":"▼"}</span>
                          </div>
                          <div style={{ flex:1, position:"relative" }}>
                            <div style={{
                              position:"absolute",
                              left:`${pct(s)}%`,
                              width:`${Math.max(0.5,pct(e)-pct(s))}%`,
                              top:"50%", transform:"translateY(-50%)",
                              height:8, background:"rgba(255,255,255,.35)", borderRadius:4,
                            }} />
                          </div>
                        </div>

                        {/* Task rows */}
                        {open && phase.tasks.map((task, ti) => (
                          <div key={task.id}
                            style={{
                              display:"flex",
                              background: selectedTask && selectedTask.id===task.id ? urg.light : ti%2===0 ? "#fff" : "#fafafa",
                              borderBottom:"1px solid #f1f5f9", height:ROW_H,
                            }}
                          >
                            {/* Label col */}
                            <div
                              onClick={() => selectTask(task)}
                              style={{
                                width:LABEL_W, minWidth:LABEL_W, flexShrink:0,
                                padding:"0 10px 0 26px",
                                display:"flex", alignItems:"center", gap:8,
                                borderRight:"2px solid #e2e8f0", cursor:"pointer",
                              }}
                            >
                              <span style={{
                                background:urg.bg, color:"#fff", borderRadius:4,
                                padding:"2px 6px", fontSize:9, fontWeight:800, minWidth:34, textAlign:"center", flexShrink:0,
                              }}>{task.id}</span>
                              <span style={{ fontSize:11, fontWeight:500, color:"#334155", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", flex:1 }}>
                                {task.name}
                              </span>
                              <span style={{ fontSize:9, color:"#94a3b8", whiteSpace:"nowrap", flexShrink:0 }}>
                                {task.end-task.start}j
                              </span>
                            </div>

                            {/* Bar col */}
                            <div style={{ flex:1, position:"relative" }}>
                              {MONTHS.map(m => (
                                <div key={m.label} style={{
                                  position:"absolute", left:`${pct(m.start)}%`,
                                  top:0, bottom:0, width:1,
                                  background:"#f1f5f9", zIndex:1,
                                }} />
                              ))}
                              <div style={{
                                position:"absolute", left:`${pct(TODAY)}%`,
                                top:0, bottom:0, width:2,
                                background:"rgba(220,53,69,.15)", zIndex:3,
                              }} />
                              <GanttBar
                                task={task}
                                urgency={phase.urgency}
                                onSelect={selectTask}
                                selected={selectedTask && selectedTask.id===task.id}
                              />
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* ── DETAIL PANEL ── */}
              {selectedTask && (() => {
                const phase = PHASES.find(p => p.tasks.some(t => t.id===selectedTask.id));
                const urg   = URGENCY[phase.urgency];
                const moM   = selectedTask.assigned.filter(a=>a.startsWith("Mo")).map(a=>({ code:a, ...MO[a] })).filter(x=>x.name);
                const msM   = selectedTask.assigned.filter(a=>a.startsWith("Ms")).map(a=>({ code:a, ...MS[a] })).filter(x=>x.name);
                const d1    = new Date(2026,2,1+selectedTask.start).toLocaleDateString("fr-FR",{day:"numeric",month:"long"});
                const d2    = new Date(2026,2,1+selectedTask.end  ).toLocaleDateString("fr-FR",{day:"numeric",month:"long"});
                return (
                  <div style={{
                    margin:"16px 32px 0",
                    background:"#fff", borderRadius:12,
                    border:`2px solid ${urg.bg}`, padding:22,
                    boxShadow:"0 4px 20px rgba(0,0,0,.08)",
                  }}>
                    <div style={{ display:"flex", alignItems:"flex-start", gap:16, flexWrap:"wrap" }}>
                      {/* left */}
                      <div style={{ flex:1, minWidth:280 }}>
                        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
                          <span style={{ background:urg.bg, color:"#fff", borderRadius:6, padding:"4px 10px", fontSize:12, fontWeight:900 }}>{selectedTask.id}</span>
                          <span style={{ background:urg.bg, color:"#fff", borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700 }}>{urg.label}</span>
                          <button onClick={()=>setSelectedTask(null)} style={{ marginLeft:"auto", background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#94a3b8" }}>✕</button>
                        </div>
                        <h3 style={{ margin:"0 0 8px", fontSize:15, fontWeight:800, color:"#1e293b" }}>{selectedTask.name}</h3>
                        <p style={{ margin:"0 0 12px", fontSize:13, color:"#475569", lineHeight:1.6 }}>{selectedTask.desc}</p>
                        <div style={{ display:"flex", gap:20, fontSize:12, color:"#64748b", flexWrap:"wrap" }}>
                          <span>📅 Début : <strong>{d1}</strong></span>
                          <span>📅 Fin : <strong>{d2}</strong></span>
                          <span>⏱ Durée : <strong>{selectedTask.end-selectedTask.start} jours</strong></span>
                        </div>
                      </div>
                      {/* right */}
                      <div style={{ display:"flex", gap:24, flexWrap:"wrap" }}>
                        {moM.length > 0 && (
                          <div style={{ minWidth:200 }}>
                            <div style={{ fontWeight:700, fontSize:11, color:"#0a3622", marginBottom:8, textTransform:"uppercase", letterSpacing:1 }}>🏛️ Organisateurs</div>
                            {moM.map(m => <MemberBadge key={m.code} code={m.code} data={m} type="Mo" />)}
                          </div>
                        )}
                        {msM.length > 0 && (
                          <div style={{ minWidth:200 }}>
                            <div style={{ fontWeight:700, fontSize:11, color:"#084298", marginBottom:8, textTransform:"uppercase", letterSpacing:1 }}>🔬 Scientifiques</div>
                            {msM.map(m => <MemberBadge key={m.code} code={m.code} data={m} type="Ms" />)}
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                );
              })()}

              {/* ── STATS ── */}
              <div style={{ display:"flex", gap:14, padding:"24px 32px 0", flexWrap:"wrap" }}>
                {[
                  { icon:"📋", label:"Total tâches",          val:PHASES.reduce((a,p)=>a+p.tasks.length,0), color:"#0a3622" },
                  { icon:"🏛️", label:"Membres organisateurs", val:Object.keys(MO).length,                   color:"#198754" },
                  { icon:"🔬", label:"Membres scientifiques", val:Object.keys(MS).length,                   color:"#084298" },
                  { icon:"📅", label:"Jours au Congrès",      val:213-TODAY,                                color:"#dc3545" },
                  { icon:"📝", label:"Axes thématiques",      val:6,                                        color:"#6c757d" },
                  { icon:"🌍", label:"Pays représentés",      val:"20+",                                    color:"#0d6efd" },
                ].map(s => (
                  <div key={s.label} style={{
                    background:"#fff", borderRadius:10, padding:"14px 18px",
                    border:"1px solid #e2e8f0", flex:"1 1 140px",
                    boxShadow:"0 1px 4px rgba(0,0,0,.05)",
                  }}>
                    <div style={{ fontSize:20, marginBottom:4 }}>{s.icon}</div>
                    <div style={{ fontSize:24, fontWeight:900, color:s.color }}>{s.val}</div>
                    <div style={{ fontSize:11, color:"#64748b", fontWeight:600 }}>{s.label}</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{ textAlign:"center", padding:"18px 0 26px", fontSize:11, color:"#94a3b8" }}>
            SDBQL 2026 · Université Abou Bekr Belkaid · Tlemcen, Algérie · Développé avec 💚
          </div>
        </div>
      );
    }

    /* ── MOUNT ── */
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>
</body>
</html>
